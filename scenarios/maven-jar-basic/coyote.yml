# Expected outcome: a tiny Maven-style project produces a small JAR artifact and readable metadata.
version: 1

pipeline:
  name: maven-jar-basic
  image: alpine:latest

steps:
  - name: package
    command: sh ./scripts/run.sh

artifacts:
  - path: target/demo-app-1.0.0.jar
    name: maven/demo-app
    type: generic
    version:
      template: 1.0.{build_number}
      channel: latest
  - path: target/demo-app-build.json
    name: maven/demo-app-build
    type: generic
    version:
      template: 1.0.{build_number}
      channel: latest