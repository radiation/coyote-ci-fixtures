# Expected outcome: one lightweight scenario simulates a small monorepo with several submodule-style outputs
# without requiring a top-level multi-job orchestration design.
version: 1

release:
  strategy: template
  template: 0.8.{build_number}

pipeline:
  name: monorepo-lite-submodules
  image: alpine:latest

steps:
  - name: prepare
    command: ./scripts/prepare.sh

  - group:
      name: submodules
      steps:
        - name: api-module
          command: ./scripts/build-api.sh
          artifacts:
            - path: output/modules/api/api-service.jar
              name: monorepo-lite/api
              type: generic
        - name: worker-module
          command: ./scripts/build-worker.sh
          artifacts:
            - path: output/modules/worker/worker-container-image.tar
              name: monorepo-lite/worker
              type: docker_image
        - name: sdk-module
          command: ./scripts/build-sdk.sh
          artifacts:
            - path: output/modules/sdk/sdk-package-0.8.0.tgz
              name: monorepo-lite/sdk
              type: npm_package

  - name: manifest
    command: ./scripts/write-manifest.sh

artifacts:
  paths:
    - output/modules/api/**
    - output/modules/worker/**
    - output/modules/sdk/**
    - output/manifest/**